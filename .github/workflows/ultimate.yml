# =============================================================================
# Android Custom Recovery Builder - GitHub Actions Workflow
# =============================================================================
# Supports: TWRP, OFRP (OrangeFox), PBRP (PitchBlack Recovery Project)
# Branches: 12.1, 14.1 (where supported)
# Recovery Output Types: recovery.img, boot.img, vendor_boot.img, dtbo.img, zip
# =============================================================================

name: Recovery Builder (Universal)

on:
  workflow_dispatch:
    inputs:
      # =========================================================================
      # Recovery Type Selection
      # =========================================================================
      RECOVERY_TYPE:
        description: 'Select Recovery Type'
        required: true
        default: 'OFRP'
        type: choice
        options:
          - TWRP
          - OFRP
          - PBRP

      # =========================================================================
      # Manifest Branch Selection
      # =========================================================================
      MANIFEST_BRANCH:
        description: 'Select Manifest Branch'
        required: true
        default: '12.1'
        type: choice
        options:
          - '12.1'
          - '14.1'

      # =========================================================================
      # Device Tree Configuration
      # =========================================================================
      DEVICE_TREE_URL:
        description: 'Device Tree Git URL (e.g., https://github.com/username/device_codename)'
        required: true
        default: 'https://github.com/SWDevelopments/android_device_motorola_manaus-TWRP'
        type: string

      DEVICE_TREE_BRANCH:
        description: 'Device Tree Branch (e.g., main, master, twrp-12.1)'
        required: true
        default: '3-45-3-2-1'
        type: string

      DEVICE_NAME:
        description: 'Device Codename (e.g., surya, mido, lavender)'
        required: true
        default: 'manaus'
        type: string

      DEVICE_PATH:
        description: 'Device Tree Path (e.g., device/xiaomi/surya)'
        default: 'device/motorola/manaus'
        required: true
        type: string

      # =========================================================================
      # Build Configuration
      # =========================================================================
      BUILD_TYPE:
        description: 'Build Type'
        required: true
        default: 'eng'
        type: choice
        options:
          - userdebug
          - eng

      # =========================================================================
      # Recovery Output Type Selection
      # =========================================================================
      RECOVERY_OUTPUT:
        description: 'Recovery Output Type (what file to build)'
        required: true
        default: 'vendor_boot'
        type: choice
        options:
          - recovery          # recovery.img - Standard recovery partition
          - boot              # boot.img - For A/B devices or recovery-in-boot
          - vendor_boot       # vendor_boot.img - For devices with vendor_boot partition
          - dtbo              # dtbo.img - For devices requiring dtbo
          - zip               # Flashable zip package
          - all               # Build all available outputs

      # =========================================================================
      # Additional Options
      # =========================================================================
      MAKE_JOBS:
        description: 'Number of Make Jobs (default: auto)'
        required: false
        default: 'auto'
        type: string

      EXTRA_CMD:
        description: 'Extra Commands (optional, for advanced users)'
        required: false
        default: ''
        type: string

env:
  WORKSPACE: ${{ github.workspace }}
  CCACHE_DIR: ${{ github.workspace }}/.ccache
  CCACHE_COMPRESS: 1
  CCACHE_COMPRESSLEVEL: 9

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:22.04
      options: --privileged

    steps:
      # =========================================================================
      # Step 1: Environment Setup
      # =========================================================================
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Initialize Environment
        shell: bash
        run: |
          echo "============================================================"
          echo "Setting up build environment..."
          echo "============================================================"

          export RECOVERY_TYPE="${{ inputs.RECOVERY_TYPE }}"
          export MANIFEST_BRANCH="${{ inputs.MANIFEST_BRANCH }}"
          export DEVICE_TREE_URL="${{ inputs.DEVICE_TREE_URL }}"
          export DEVICE_TREE_BRANCH="${{ inputs.DEVICE_TREE_BRANCH }}"
          export DEVICE_NAME="${{ inputs.DEVICE_NAME }}"
          export DEVICE_PATH="${{ inputs.DEVICE_PATH }}"
          export BUILD_TYPE="${{ inputs.BUILD_TYPE }}"
          export RECOVERY_OUTPUT="${{ inputs.RECOVERY_OUTPUT }}"
          export MAKE_JOBS="${{ inputs.MAKE_JOBS }}"
          export EXTRA_CMD="${{ inputs.EXTRA_CMD }}"

          echo "RECOVERY_TYPE=$RECOVERY_TYPE" >> $GITHUB_ENV
          echo "MANIFEST_BRANCH=$MANIFEST_BRANCH" >> $GITHUB_ENV
          echo "DEVICE_TREE_URL=$DEVICE_TREE_URL" >> $GITHUB_ENV
          echo "DEVICE_TREE_BRANCH=$DEVICE_TREE_BRANCH" >> $GITHUB_ENV
          echo "DEVICE_NAME=$DEVICE_NAME" >> $GITHUB_ENV
          echo "DEVICE_PATH=$DEVICE_PATH" >> $GITHUB_ENV
          echo "BUILD_TYPE=$BUILD_TYPE" >> $GITHUB_ENV
          echo "RECOVERY_OUTPUT=$RECOVERY_OUTPUT" >> $GITHUB_ENV

          if [ "$MAKE_JOBS" = "auto" ] || [ -z "$MAKE_JOBS" ]; then
            MAKE_JOBS=$(nproc --all)
          fi
          echo "MAKE_JOBS=$MAKE_JOBS" >> $GITHUB_ENV

          echo "============================================================"
          echo "Configuration Summary:"
          echo "============================================================"
          echo "Recovery Type: $RECOVERY_TYPE"
          echo "Manifest Branch: $MANIFEST_BRANCH"
          echo "Device Name: $DEVICE_NAME"
          echo "Device Path: $DEVICE_PATH"
          echo "Device Tree URL: $DEVICE_TREE_URL"
          echo "Device Tree Branch: $DEVICE_TREE_BRANCH"
          echo "Build Type: $BUILD_TYPE"
          echo "Recovery Output: $RECOVERY_OUTPUT"
          echo "Make Jobs: $MAKE_JOBS"
          echo "============================================================"

      - name: Install Build Dependencies
        shell: bash
        run: |
          echo "Installing required packages..."
          export DEBIAN_FRONTEND=noninteractive

          apt-get update -y

          apt-get install -y \
            git git-lfs gnupg flex bison gperf build-essential \
            zip curl wget zlib1g-dev gcc-multilib g++-multilib \
            libc6-dev lib32ncurses5-dev libncurses5-dev \
            x11proto-core-dev libx11-dev lib32z-dev ccache \
            libgl1-mesa-dev libxml2-utils xsltproc unzip bc jq \
            python3 python3-pip rsync schedtool libssl-dev \
            libncurses5 lzop liblz4-tool zstd libstdc++6 libgcc1

          curl https://storage.googleapis.com/git-repo-downloads/repo > /usr/local/bin/repo
          chmod a+x /usr/local/bin/repo

          git config --global user.name "Recovery Builder"
          git config --global user.email "builder@github.com"
          git config --global color.ui auto

          echo "Dependencies installed successfully!"

      # =========================================================================
      # Step 2: Set Recovery-Specific Variables
      # =========================================================================
      - name: Set Manifest Variables
        id: set_vars
        shell: bash
        run: |
          RECOVERY_TYPE="${{ env.RECOVERY_TYPE }}"
          MANIFEST_BRANCH="${{ env.MANIFEST_BRANCH }}"
          RECOVERY_OUTPUT="${{ env.RECOVERY_OUTPUT }}"

          echo "============================================================"
          echo "Setting up manifest for $RECOVERY_TYPE on branch $MANIFEST_BRANCH"
          echo "============================================================"

          case "$RECOVERY_TYPE" in
            TWRP)
              case "$MANIFEST_BRANCH" in
                "12.1")
                  MANIFEST_URL="https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp"
                  MANIFEST_BRANCH_NAME="twrp-12.1"
                  ;;
                "14.1")
                  MANIFEST_URL="https://github.com/minimal-manifest-twrp/platform_manifest_twrp_lineageos"
                  MANIFEST_BRANCH_NAME="twrp-14.1"
                  ;;
                *)
                  echo "ERROR: Unsupported branch $MANIFEST_BRANCH for TWRP"
                  exit 1
                  ;;
              esac
              ;;

            OFRP)
              case "$MANIFEST_BRANCH" in
                "12.1")
                  MANIFEST_URL="https://gitlab.com/OrangeFox/sync"
                  MANIFEST_BRANCH_NAME="fox_12.1"
                  ;;
                "14.1")
                  echo "NOTE: OFRP does not officially support branch 14.1. Using 12.1 instead."
                  MANIFEST_URL="https://gitlab.com/OrangeFox/sync"
                  MANIFEST_BRANCH_NAME="fox_12.1"
                  ;;
                *)
                  echo "ERROR: Unsupported branch $MANIFEST_BRANCH for OFRP"
                  exit 1
                  ;;
              esac
              ;;

            PBRP)
              case "$MANIFEST_BRANCH" in
                "12.1")
                  MANIFEST_URL="https://github.com/PitchBlackRecoveryProject/manifest_pb"
                  MANIFEST_BRANCH_NAME="android-12.1"
                  ;;
                "14.1")
                  echo "NOTE: PBRP does not officially support branch 14.1. Using 12.1 instead."
                  MANIFEST_URL="https://github.com/PitchBlackRecoveryProject/manifest_pb"
                  MANIFEST_BRANCH_NAME="android-12.1"
                  ;;
                *)
                  echo "ERROR: Unsupported branch $MANIFEST_BRANCH for PBRP"
                  exit 1
                  ;;
              esac
              ;;

            *)
              echo "ERROR: Unknown recovery type: $RECOVERY_TYPE"
              exit 1
              ;;
          esac

          case "$RECOVERY_OUTPUT" in
            recovery)
              BUILD_TARGETS="recoveryimage"
              ;;
            boot)
              BUILD_TARGETS="bootimage"
              ;;
            vendor_boot)
              BUILD_TARGETS="vendorbootimage"
              ;;
            dtbo)
              BUILD_TARGETS="dtboimage"
              ;;
            zip)
              BUILD_TARGETS="recoveryimage"
              MAKE_ZIP="true"
              ;;
            all)
              BUILD_TARGETS="recoveryimage bootimage vendorbootimage dtboimage"
              MAKE_ZIP="true"
              ;;
            *)
              echo "WARNING: Unknown recovery output type, defaulting to recoveryimage"
              BUILD_TARGETS="recoveryimage"
              ;;
          esac

          echo "MANIFEST_URL=$MANIFEST_URL" >> $GITHUB_ENV
          echo "MANIFEST_BRANCH_NAME=$MANIFEST_BRANCH_NAME" >> $GITHUB_ENV
          echo "BUILD_TARGETS=$BUILD_TARGETS" >> $GITHUB_ENV

          if [ -n "$MAKE_ZIP" ]; then
            echo "MAKE_ZIP=$MAKE_ZIP" >> $GITHUB_ENV
          fi

          echo "Manifest URL: $MANIFEST_URL"
          echo "Manifest Branch: $MANIFEST_BRANCH_NAME"
          echo "Build Targets: $BUILD_TARGETS"

      # =========================================================================
      # Step 3: Sync Source Code
      # =========================================================================
      - name: Sync Recovery Source
        shell: bash
        run: |
          echo "============================================================"
          echo "Syncing ${{ env.RECOVERY_TYPE }} source code..."
          echo "============================================================"

          mkdir -p "${{ env.WORKSPACE }}/fox"
          cd "${{ env.WORKSPACE }}/fox"

          RECOVERY_TYPE="${{ env.RECOVERY_TYPE }}"
          MANIFEST_URL="${{ env.MANIFEST_URL }}"
          MANIFEST_BRANCH_NAME="${{ env.MANIFEST_BRANCH_NAME }}"

          if [ "$RECOVERY_TYPE" = "OFRP" ]; then
            echo "Cloning OrangeFox sync repository..."
            git clone --depth=1 --branch "$MANIFEST_BRANCH_NAME" "$MANIFEST_URL" sync || {
              echo "WARNING: Failed to clone branch $MANIFEST_BRANCH_NAME, trying master..."
              git clone --depth=1 "$MANIFEST_URL" sync
            }

            cd sync
            echo "Running OrangeFox sync script..."

            if [ -f "sync.sh" ]; then
              chmod +x sync.sh
              ./sync.sh --branch="$MANIFEST_BRANCH_NAME" || {
                echo "Sync script failed, trying manual sync..."
                cd ..
                rm -rf sync
                repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp -b twrp-12.1 --depth=1
                repo sync -c -j$(nproc --all) --force-sync --no-tags --no-clone-bundle
              }
            else
              echo "No sync.sh found, using manual sync..."
              cd ..
              rm -rf sync
              repo init -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp -b twrp-12.1 --depth=1
              repo sync -c -j$(nproc --all) --force-sync --no-tags --no-clone-bundle
            fi
          else
            echo "Initializing repository..."
            repo init -u "$MANIFEST_URL" -b "$MANIFEST_BRANCH_NAME" --depth=1

            echo "Syncing repository (this may take a while)..."
            repo sync -c -j${{ env.MAKE_JOBS }} --force-sync --no-tags --no-clone-bundle
          fi

          echo "Source sync completed!"

      # =========================================================================
      # Step 4: Clone Device Tree
      # =========================================================================
      - name: Clone Device Tree
        shell: bash
        run: |
          echo "============================================================"
          echo "Cloning device tree..."
          echo "============================================================"

          cd "${{ env.WORKSPACE }}/fox"

          DEVICE_TREE_URL="${{ env.DEVICE_TREE_URL }}"
          DEVICE_TREE_BRANCH="${{ env.DEVICE_TREE_BRANCH }}"
          DEVICE_PATH="${{ env.DEVICE_PATH }}"
          DEVICE_NAME="${{ env.DEVICE_NAME }}"

          mkdir -p "$(dirname "$DEVICE_PATH")"

          echo "Cloning $DEVICE_TREE_URL (branch: $DEVICE_TREE_BRANCH) to $DEVICE_PATH..."
          git clone --depth=1 --branch="$DEVICE_TREE_BRANCH" "$DEVICE_TREE_URL" "$DEVICE_PATH" || {
            echo "WARNING: Failed to clone with branch $DEVICE_TREE_BRANCH, trying default branch..."
            git clone --depth=1 "$DEVICE_TREE_URL" "$DEVICE_PATH"
          }

          echo "Device tree cloned successfully!"

          if [ -f "$DEVICE_PATH/dependencies.json" ]; then
            echo "Found dependencies.json, processing dependencies..."
            cat "$DEVICE_PATH/dependencies.json"

            DEPENDENCIES=$(cat "$DEVICE_PATH/dependencies.json")
            echo "$DEPENDENCIES" | jq -c '.[]' 2>/dev/null | while read -r dep; do
              DEP_PATH=$(echo "$dep" | jq -r '.path')
              DEP_URL=$(echo "$dep" | jq -r '.url')
              DEP_BRANCH=$(echo "$dep" | jq -r '.branch // "main"')

              echo "Cloning dependency: $DEP_URL to $DEP_PATH"
              mkdir -p "$(dirname "$DEP_PATH")"
              git clone --depth=1 --branch="$DEP_BRANCH" "$DEP_URL" "$DEP_PATH" || {
                echo "WARNING: Failed to clone dependency $DEP_URL"
              }
            done
          fi

          if [ -f "$DEVICE_PATH/custom_dependencies" ]; then
            echo "Found custom_dependencies file, processing..."
            while IFS='|' read -r dep_url dep_branch dep_path; do
              if [ -n "$dep_url" ] && [ -n "$dep_path" ]; then
                dep_branch=${dep_branch:-main}
                echo "Cloning: $dep_url ($dep_branch) -> $dep_path"
                mkdir -p "$(dirname "$dep_path")"
                git clone --depth=1 --branch="$dep_branch" "$dep_url" "$dep_path" || true
              fi
            done < "$DEVICE_PATH/custom_dependencies"
          fi

          echo "All dependencies processed!"

      # =========================================================================
      # Step 5: Build Recovery
      # =========================================================================
      - name: Build Recovery
        id: build
        shell: bash
        run: |
          echo "============================================================"
          echo "Building ${{ env.RECOVERY_TYPE }} for ${{ env.DEVICE_NAME }}"
          echo "============================================================"

          cd "${{ env.WORKSPACE }}/fox"

          RECOVERY_TYPE="${{ env.RECOVERY_TYPE }}"
          DEVICE_NAME="${{ env.DEVICE_NAME }}"
          BUILD_TYPE="${{ env.BUILD_TYPE }}"
          MAKE_JOBS="${{ env.MAKE_JOBS }}"
          BUILD_TARGETS="${{ env.BUILD_TARGETS }}"
          EXTRA_CMD="${{ inputs.EXTRA_CMD }}"

          echo "Setting up build environment..."

          if [ -f "build/envsetup.sh" ]; then
            . build/envsetup.sh
          else
            echo "ERROR: build/envsetup.sh not found!"
            exit 1
          fi

          echo "Lunching device: $DEVICE_NAME"

          case "$RECOVERY_TYPE" in
            TWRP)
              lunch "twrp_$DEVICE_NAME-$BUILD_TYPE" || {
                echo "Trying alternative lunch command..."
                lunch "omni_$DEVICE_NAME-$BUILD_TYPE" || {
                  echo "ERROR: Failed to lunch device $DEVICE_NAME"
                  exit 1
                }
              }
              ;;

            OFRP)
              lunch "twrp_$DEVICE_NAME-$BUILD_TYPE" || {
                echo "Trying OrangeFox lunch variants..."
                lunch "omni_$DEVICE_NAME-$BUILD_TYPE" || {
                  lunch "fox_$DEVICE_NAME-$BUILD_TYPE" || {
                    echo "ERROR: Failed to lunch device $DEVICE_NAME for OFRP"
                    exit 1
                  }
                }
              }
              ;;

            PBRP)
              lunch "twrp_$DEVICE_NAME-$BUILD_TYPE" || {
                echo "Trying PBRP lunch variants..."
                lunch "omni_$DEVICE_NAME-$BUILD_TYPE" || {
                  lunch "pb_$DEVICE_NAME-$BUILD_TYPE" || {
                    echo "ERROR: Failed to lunch device $DEVICE_NAME for PBRP"
                    exit 1
                  }
                }
              }
              ;;

            *)
              echo "ERROR: Unknown recovery type: $RECOVERY_TYPE"
              exit 1
              ;;
          esac

          if [ -n "$EXTRA_CMD" ]; then
            echo "Running extra commands: $EXTRA_CMD"
            eval "$EXTRA_CMD"
          fi

          echo "============================================================"
          echo "Starting build with $MAKE_JOBS parallel jobs..."
          echo "Build targets: $BUILD_TARGETS"
          echo "============================================================"

          START_TIME=$(date +%s)
          BUILD_SUCCESS="true"

          for target in $BUILD_TARGETS; do
            echo ""
            echo "------------------------------------------------------------"
            echo "Building target: $target"
            echo "------------------------------------------------------------"

            if mka $target -j$MAKE_JOBS; then
              echo "Successfully built: $target"
            else
              echo "mka failed for $target, trying with make..."
              if make $target -j$MAKE_JOBS; then
                echo "Successfully built: $target (using make)"
              else
                echo "Failed to build: $target"
                BUILD_SUCCESS="false"
              fi
            fi
          done

          END_TIME=$(date +%s)
          BUILD_DURATION=$((END_TIME - START_TIME))

          echo "============================================================"
          echo "Build completed in $BUILD_DURATION seconds!"
          echo "============================================================"

          if [ "$BUILD_SUCCESS" = "true" ]; then
            echo "BUILD_STATUS=success" >> $GITHUB_OUTPUT
          else
            echo "BUILD_STATUS=partial" >> $GITHUB_OUTPUT
          fi

      # =========================================================================
      # Step 6: Prepare Artifacts
      # =========================================================================
      - name: Prepare Artifacts
        id: artifacts
        if: success() || steps.build.outputs.BUILD_STATUS == 'partial'
        shell: bash
        run: |
          echo "============================================================"
          echo "Preparing build artifacts..."
          echo "============================================================"

          cd "${{ env.WORKSPACE }}/fox"

          DEVICE_NAME="${{ env.DEVICE_NAME }}"
          RECOVERY_TYPE="${{ env.RECOVERY_TYPE }}"
          MANIFEST_BRANCH="${{ env.MANIFEST_BRANCH }}"
          RECOVERY_OUTPUT="${{ env.RECOVERY_OUTPUT }}"
          BUILD_DATE=$(date +%Y%m%d)

          OUTPUT_DIR="${{ env.WORKSPACE }}/output"
          mkdir -p "$OUTPUT_DIR"

          PRODUCT_DIR="out/target/product/$DEVICE_NAME"

          if [ ! -d "$PRODUCT_DIR" ]; then
            echo "ERROR: Product directory not found: $PRODUCT_DIR"
            echo "Searching for output directory..."
            PRODUCT_DIR=$(find out/target/product -mindepth 1 -maxdepth 1 -type d 2>/dev/null | head -n 1)
            echo "Found: $PRODUCT_DIR"
          fi

          FOUND_ARTIFACTS=""

          echo "============================================================"
          echo "Searching for recovery files..."
          echo "============================================================"

          process_artifact() {
            local src_file="$1"
            local artifact_type="$2"
            local output_name="${RECOVERY_TYPE}-${DEVICE_NAME}-${artifact_type}-${MANIFEST_BRANCH}-${BUILD_DATE}.img"

            if [ -f "$src_file" ]; then
              cp "$src_file" "$OUTPUT_DIR/$output_name"
              if [ -z "$FOUND_ARTIFACTS" ]; then
                FOUND_ARTIFACTS="$output_name"
              else
                FOUND_ARTIFACTS="$FOUND_ARTIFACTS,$output_name"
              fi
              echo "Found and copied: $artifact_type -> $output_name"
              echo "File size: $(ls -lh "$OUTPUT_DIR/$output_name" | awk '{print $5}')"
              return 0
            fi
            return 1
          }

          create_flashable_zip() {
            local recovery_img="$1"
            local zip_name="${RECOVERY_TYPE}-${DEVICE_NAME}-${MANIFEST_BRANCH}-${BUILD_DATE}.zip"
            
            echo "Creating flashable zip: $zip_name"

            ZIP_TEMP="${{ env.WORKSPACE }}/zip_temp"
            mkdir -p "$ZIP_TEMP/META-INF/com/google/android"

            cp "$recovery_img" "$ZIP_TEMP/recovery.img"

            # Create update-binary using printf to avoid heredoc issues
            printf '%s\n' '#!/sbin/sh' \
              '# Simple recovery flash script' \
              'echo "Flashing recovery..."' \
              '' \
              'if [ -e "/dev/block/by-name/recovery" ]; then' \
              '    echo "Found recovery partition..."' \
              '    dd if=/tmp/recovery.img of=/dev/block/by-name/recovery' \
              'elif [ -e "/dev/block/bootdevice/by-name/recovery" ]; then' \
              '    echo "Found recovery partition (bootdevice)..."' \
              '    dd if=/tmp/recovery.img of=/dev/block/bootdevice/by-name/recovery' \
              'elif [ -e "/dev/block/by-name/boot" ]; then' \
              '    echo "Found boot partition (A/B device)..."' \
              '    dd if=/tmp/recovery.img of=/dev/block/by-name/boot' \
              'elif [ -e "/dev/block/bootdevice/by-name/boot" ]; then' \
              '    echo "Found boot partition (bootdevice, A/B device)..."' \
              '    dd if=/tmp/recovery.img of=/dev/block/bootdevice/by-name/boot' \
              'else' \
              '    echo "ERROR: Could not find recovery or boot partition!"' \
              '    exit 1' \
              'fi' \
              '' \
              'echo "Recovery flashed successfully!"' \
              > "$ZIP_TEMP/META-INF/com/google/android/update-binary"
            
            chmod +x "$ZIP_TEMP/META-INF/com/google/android/update-binary"

            # Create updater-script
            printf '%s\n' \
              '# Flash recovery' \
              'package_extract_file("recovery.img", "/tmp/recovery.img");' \
              'run_program("/sbin/sh", "/tmp/update-binary");' \
              > "$ZIP_TEMP/META-INF/com/google/android/updater-script"

            cd "$ZIP_TEMP"
            zip -r "$OUTPUT_DIR/$zip_name" .
            cd "$OUTPUT_DIR"

            if [ -z "$FOUND_ARTIFACTS" ]; then
              FOUND_ARTIFACTS="$zip_name"
            else
              FOUND_ARTIFACTS="$FOUND_ARTIFACTS,$zip_name"
            fi
            echo "Created flashable zip: $zip_name"
          }

          case "$RECOVERY_OUTPUT" in
            recovery)
              for path in "$PRODUCT_DIR/recovery.img" "$PRODUCT_DIR/obj/PACKAGING/recovery_intermediates/recovery.img"; do
                if process_artifact "$path" "recovery"; then break; fi
              done
              ;;

            boot)
              for path in "$PRODUCT_DIR/boot.img" "$PRODUCT_DIR/obj/PACKAGING/boot_intermediates/boot.img"; do
                if process_artifact "$path" "boot"; then break; fi
              done
              ;;

            vendor_boot)
              for path in "$PRODUCT_DIR/vendor_boot.img" "$PRODUCT_DIR/obj/PACKAGING/vendor_boot_intermediates/vendor_boot.img"; do
                if process_artifact "$path" "vendor_boot"; then break; fi
              done
              ;;

            dtbo)
              for path in "$PRODUCT_DIR/dtbo.img" "$PRODUCT_DIR/obj/PACKAGING/dtbo_intermediates/dtbo.img"; do
                if process_artifact "$path" "dtbo"; then break; fi
              done
              ;;

            zip)
              RECOVERY_IMG=""
              for path in "$PRODUCT_DIR/recovery.img" "$PRODUCT_DIR/obj/PACKAGING/recovery_intermediates/recovery.img"; do
                if [ -f "$path" ]; then
                  RECOVERY_IMG="$path"
                  break
                fi
              done

              if [ -n "$RECOVERY_IMG" ] && [ -f "$RECOVERY_IMG" ]; then
                create_flashable_zip "$RECOVERY_IMG"
              fi
              ;;

            all)
              echo "Searching for all possible recovery outputs..."

              for path in "$PRODUCT_DIR/recovery.img" "$PRODUCT_DIR/obj/PACKAGING/recovery_intermediates/recovery.img"; do
                if process_artifact "$path" "recovery"; then break; fi
              done

              for path in "$PRODUCT_DIR/boot.img" "$PRODUCT_DIR/obj/PACKAGING/boot_intermediates/boot.img"; do
                if process_artifact "$path" "boot"; then break; fi
              done

              for path in "$PRODUCT_DIR/vendor_boot.img" "$PRODUCT_DIR/obj/PACKAGING/vendor_boot_intermediates/vendor_boot.img"; do
                if process_artifact "$path" "vendor_boot"; then break; fi
              done

              for path in "$PRODUCT_DIR/dtbo.img" "$PRODUCT_DIR/obj/PACKAGING/dtbo_intermediates/dtbo.img"; do
                if process_artifact "$path" "dtbo"; then break; fi
              done

              echo ""
              echo "Searching for additional .img files..."
              for img_file in "$PRODUCT_DIR"/*.img; do
                if [ -f "$img_file" ]; then
                  filename=$(basename "$img_file" .img)
                  if echo "$FOUND_ARTIFACTS" | grep -q "$filename"; then
                    continue
                  fi
                  process_artifact "$img_file" "$filename"
                fi
              done
              ;;
          esac

          echo ""
          echo "============================================================"
          echo "Artifact Summary:"
          echo "============================================================"

          if [ -z "$FOUND_ARTIFACTS" ]; then
            echo "ERROR: No recovery files found!"
            echo ""
            echo "Searching for any .img files in output directory..."
            find "$PRODUCT_DIR" -name "*.img" -type f 2>/dev/null || true
            echo ""
            echo "Listing product directory contents:"
            ls -la "$PRODUCT_DIR" 2>/dev/null || true
            exit 1
          fi

          cd "$OUTPUT_DIR"
          
          # Count artifacts
          ARTIFACT_COUNT=$(echo "$FOUND_ARTIFACTS" | tr ',' '\n' | wc -l)
          
          # Generate checksums
          for artifact in $(echo "$FOUND_ARTIFACTS" | tr ',' '\n'); do
            if [ -f "$artifact" ]; then
              echo "Generating checksums for: $artifact"
              md5sum "$artifact" > "${artifact}.md5sum"
              sha256sum "$artifact" > "${artifact}.sha256sum"
            fi
          done

          echo ""
          echo "Final artifacts:"
          ls -lh "$OUTPUT_DIR/"

          echo "ARTIFACT_LIST=$FOUND_ARTIFACTS" >> $GITHUB_ENV
          echo "ARTIFACT_COUNT=$ARTIFACT_COUNT" >> $GITHUB_ENV

      - name: Upload Recovery Artifacts
        if: success() || steps.build.outputs.BUILD_STATUS == 'partial'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.RECOVERY_TYPE }}-${{ env.DEVICE_NAME }}-${{ env.MANIFEST_BRANCH }}
          path: |
            ${{ env.WORKSPACE }}/output/*.img
            ${{ env.WORKSPACE }}/output/*.zip
            ${{ env.WORKSPACE }}/output/*.md5sum
            ${{ env.WORKSPACE }}/output/*.sha256sum
          retention-days: 30
          if-no-files-found: warn

      # =========================================================================
      # Step 7: Build Summary
      # =========================================================================
      - name: Build Summary
        if: always()
        shell: bash
        run: |
          echo "============================================================"
          echo "Build Summary"
          echo "============================================================"
          echo "Recovery Type: ${{ env.RECOVERY_TYPE }}"
          echo "Manifest Branch: ${{ env.MANIFEST_BRANCH }}"
          echo "Device: ${{ env.DEVICE_NAME }}"
          echo "Device Path: ${{ env.DEVICE_PATH }}"
          echo "Build Type: ${{ env.BUILD_TYPE }}"
          echo "Recovery Output: ${{ env.RECOVERY_OUTPUT }}"
          echo "Build Status: ${{ steps.build.outputs.BUILD_STATUS }}"
          echo "Artifacts Found: ${{ env.ARTIFACT_COUNT }}"

          if [ -n "${{ env.ARTIFACT_LIST }}" ]; then
            echo ""
            echo "Generated Artifacts:"
            echo "${{ env.ARTIFACT_LIST }}" | tr ',' '\n' | while read -r artifact; do
              echo "  - $artifact"
            done
            echo ""
            echo "Download your recovery files from the Artifacts section above."
          else
            echo ""
            echo "Build completed but no artifacts were found."
            echo "Please check the build logs for errors."
          fi

          echo "============================================================"
          echo ""
          echo "Device Type Information:"
          echo "  - recovery.img: Standard recovery partition (most devices)"
          echo "  - boot.img: A/B devices or recovery built into boot"
          echo "  - vendor_boot.img: Newer devices with vendor_boot partition"
          echo "  - dtbo.img: Devices requiring device tree overlay"
          echo "  - zip: Flashable zip for easy installation"
          echo "============================================================"

      # =========================================================================
      # Step 8: Cleanup
      # =========================================================================
      - name: Cleanup Workspace
        if: always()
        shell: bash
        run: |
          echo "Cleaning up workspace..."
          cd "${{ env.WORKSPACE }}"
          rm -rf fox || true
          rm -rf zip_temp || true
          rm -rf .ccache || true
          echo "Cleanup completed!"
